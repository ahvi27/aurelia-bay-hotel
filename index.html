<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurelia &amp; Bay — Luxury Stay, Comfortable Experience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animations.css">
</head>
<body>

<!-- ============ LOADING SCREEN ============ -->
<div id="loadingScreen" class="loading-screen">
  <div class="loader-mark">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
      <path d="M28 4 L52 16 V40 L28 52 L4 40 V16 Z" stroke="currentColor" stroke-width="1.5"/>
      <path d="M28 4 V52 M4 16 L52 40 M52 16 L4 40" stroke="currentColor" stroke-width="0.75" opacity="0.5"/>
    </svg>
  </div>
</div>

<!-- ============ TOASTS / MODALS CONTAINER ============ -->
<div id="toastContainer" class="toast-container"></div>

<!-- ============ NAVBAR ============ -->
<header class="navbar" id="navbar">
  <div class="navbar-inner">
    <a href="#" class="logo" data-route="home">
      <span class="logo-mark">AB</span>
      <span class="logo-text">Aurelia&nbsp;&amp;&nbsp;Bay</span>
    </a>

    <nav class="nav-links" id="navLinks">
      <a href="#" data-route="home">Home</a>
      <a href="#" data-route="rooms">Rooms</a>
      <a href="#" data-route="about">About</a>
      <a href="#" data-route="gallery">Gallery</a>
      <a href="#" data-route="contact">Contact</a>
    </nav>

    <div class="navbar-actions">
      <button class="icon-btn" id="darkModeToggle" aria-label="Toggle dark mode" title="Toggle dark mode">
        <i class="fa-solid fa-moon"></i>
      </button>
      <button class="btn btn-gold btn-small" data-route="reservation">Book Now</button>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ============ MOBILE MENU ============ -->
<div class="mobile-menu" id="mobileMenu">
  <a href="#" data-route="home">Home</a>
  <a href="#" data-route="rooms">Rooms</a>
  <a href="#" data-route="about">About</a>
  <a href="#" data-route="gallery">Gallery</a>
  <a href="#" data-route="contact">Contact</a>
  <button class="btn btn-gold" data-route="reservation">Book Now</button>
</div>

<main id="app"></main>

<!-- ============ SCROLL TO TOP ============ -->
<button id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
  <i class="fa-solid fa-arrow-up"></i>
</button>

<!-- ============ FLOATING BOOK NOW ============ -->
<button id="floatingBook" class="floating-book" data-route="reservation">
  <i class="fa-solid fa-calendar-check"></i>
  <span>Book Now</span>
</button>

<!-- ============ SUCCESS MODAL ============ -->
<div class="modal-overlay" id="successModal">
  <div class="modal-box">
    <button class="modal-close" id="closeSuccessModal" aria-label="Close">&times;</button>
    <div class="modal-icon"><i class="fa-solid fa-check"></i></div>
    <h3>Reservation Confirmed</h3>
    <p id="successModalText">Your room is reserved. A confirmation has been sent to your email.</p>
    <div class="modal-ref" id="modalRef"></div>
    <button class="btn btn-navy" id="successModalDone">Done</button>
  </div>
</div>

<!-- ============ LIGHTBOX ============ -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&times;</button>
  <button class="lightbox-nav lightbox-prev" id="lightboxPrev" aria-label="Previous"><i class="fa-solid fa-chevron-left"></i></button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav lightbox-next" id="lightboxNext" aria-label="Next"><i class="fa-solid fa-chevron-right"></i></button>
</div>

<script src="js/data.js"></script>
<script src="js/main.js"></script>
<script src="js/search.js"></script>
<script src="js/gallery.js"></script>
<script src="js/booking.js"></script>
<script src="js/router.js"></script>
</body>
</html>
